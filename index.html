<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
  <meta name="theme-color" content="#071018">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Flygradar">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css">
  <title>Flygradar</title>
  <style>
    :root{color-scheme:dark;--bg:#071018;--panel:rgba(9,22,32,.92);--line:#203643;--text:#eaf6fb;--muted:#89a2af;--accent:#54e0ff;--ok:#70f0a8;--warn:#ffcf66}
    *{box-sizing:border-box}
    html,body{height:100%;margin:0;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",sans-serif;color:var(--text);overflow:hidden}
    #map{position:absolute;inset:0;background:#08131b}
    .leaflet-tile{filter:saturate(.45) brightness(.55) contrast(1.15)}
    .topbar{position:absolute;z-index:1000;top:max(12px,env(safe-area-inset-top));left:12px;right:12px;display:flex;gap:8px;align-items:center;pointer-events:none}
    .brand,.pill,.panel,.btn{background:var(--panel);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border:1px solid var(--line);box-shadow:0 10px 30px rgba(0,0,0,.25)}
    .brand{padding:10px 13px;border-radius:16px;pointer-events:auto;min-width:0}
    .brand strong{display:block;font-size:16px;letter-spacing:.08em}
    .brand small{color:var(--muted);font-size:11px}
    .stats{margin-left:auto;display:flex;gap:6px;pointer-events:auto}
    .pill{border-radius:14px;padding:8px 10px;text-align:center;min-width:62px}
    .pill b{display:block;font-size:16px}.pill span{color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.08em}
    .controls{position:absolute;z-index:1000;left:12px;right:12px;bottom:max(14px,env(safe-area-inset-bottom));display:grid;gap:9px}
    .panel{border-radius:20px;padding:12px}
    .row{display:flex;gap:8px;align-items:center}
    .row+.row{margin-top:9px}
    .btn,select,input{font:inherit;color:var(--text)}
    .btn{border-radius:13px;padding:11px 12px;cursor:pointer;border-color:var(--line);font-weight:600}
    .btn.primary{background:var(--accent);color:#031016;border-color:transparent}
    .btn.icon{width:46px;padding:11px 0}
    select{flex:1;background:#0c1d28;border:1px solid var(--line);border-radius:13px;padding:10px}
    input[type=range]{flex:1;accent-color:var(--accent)}
    .label{font-size:12px;color:var(--muted);min-width:68px}.value{font-size:13px;font-weight:700;min-width:54px;text-align:right}
    .status{font-size:12px;color:var(--muted);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .details{position:absolute;z-index:1100;left:12px;right:12px;bottom:max(14px,env(safe-area-inset-bottom));transform:translateY(calc(100% + 30px));transition:.25s ease;background:rgba(7,18,27,.97);border:1px solid var(--line);border-radius:22px;padding:16px;box-shadow:0 18px 55px rgba(0,0,0,.5)}
    .details.open{transform:translateY(0)}
    .details h2{margin:0 0 2px;font-size:21px}.details .sub{color:var(--muted);font-size:12px;margin-bottom:12px}
    .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
    .cell{background:#0c1d28;border:1px solid var(--line);border-radius:13px;padding:9px;min-width:0}
    .cell span{display:block;color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.06em}.cell b{display:block;margin-top:3px;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .close{position:absolute;right:12px;top:12px;background:#132733;border:0;border-radius:50%;width:34px;height:34px;color:var(--text);font-size:18px}
    .aircraft-icon{width:32px;height:32px;display:grid;place-items:center;filter:drop-shadow(0 0 5px rgba(84,224,255,.7))}
    .aircraft-icon svg{width:27px;height:27px;fill:var(--accent);stroke:#021017;stroke-width:1}
    .user-dot{width:18px;height:18px;border-radius:50%;background:var(--ok);border:3px solid white;box-shadow:0 0 0 8px rgba(112,240,168,.16)}
    .leaflet-control-attribution{font-size:8px!important;background:rgba(7,16,24,.65)!important;color:#8da5b1!important}
    .leaflet-control-attribution a{color:#aac8d4!important}
    @media(min-width:700px){.controls{left:50%;right:auto;width:520px;transform:translateX(-50%)}.details{left:50%;right:auto;width:520px;transform:translate(-50%,calc(100% + 30px))}.details.open{transform:translate(-50%,0)}}
  </style>
</head>
<body>
  <div id="map"></div>

  <header class="topbar">
    <div class="brand"><strong>FLYGRADAR</strong><small id="coordText">Väntar på position…</small></div>
    <div class="stats">
      <div class="pill"><b id="planeCount">0</b><span>flyg</span></div>
      <div class="pill"><b id="radiusTop">50</b><span>NM</span></div>
    </div>
  </header>

  <section class="controls">
    <div class="panel">
      <div class="row">
        <button class="btn primary" id="locateBtn">⌖ Använd min position</button>
        <button class="btn icon" id="refreshBtn" aria-label="Uppdatera">↻</button>
        <select id="sourceSelect" aria-label="Datakälla">
          <option value="airplanes">Airplanes.live</option>
          <option value="adsblol">ADSB.lol</option>
        </select>
      </div>
      <div class="row">
        <span class="label">Radie</span>
        <input id="radius" type="range" min="5" max="250" step="5" value="50">
        <span class="value" id="radiusValue">50 NM</span>
      </div>
      <div class="row">
        <span class="status" id="status">Tryck på ”Använd min position” för att starta.</span>
        <label style="font-size:12px;color:var(--muted);white-space:nowrap"><input id="autoRefresh" type="checkbox" checked> Auto 10 s</label>
      </div>
    </div>
  </section>

  <aside class="details" id="details" aria-live="polite">
    <button class="close" id="closeDetails">×</button>
    <h2 id="dFlight">Okänt flyg</h2>
    <div class="sub" id="dSub">—</div>
    <div class="grid">
      <div class="cell"><span>Avstånd</span><b id="dDistance">—</b></div>
      <div class="cell"><span>Höjd</span><b id="dAltitude">—</b></div>
      <div class="cell"><span>Fart</span><b id="dSpeed">—</b></div>
      <div class="cell"><span>Riktning</span><b id="dTrack">—</b></div>
      <div class="cell"><span>Vertikal</span><b id="dVertical">—</b></div>
      <div class="cell"><span>Squawk</span><b id="dSquawk">—</b></div>
      <div class="cell"><span>Typ</span><b id="dType">—</b></div>
      <div class="cell"><span>Registrering</span><b id="dReg">—</b></div>
      <div class="cell"><span>Datakälla</span><b id="dSource">—</b></div>
    </div>
  </aside>

  <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const map = L.map('map',{zoomControl:false,attributionControl:true}).setView([59.3293,18.0686],7);
    L.control.zoom({position:'topright'}).addTo(map);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
      maxZoom:18,attribution:'© OpenStreetMap'
    }).addTo(map);

    const $ = id => document.getElementById(id);
    const state = {lat:null,lon:null,radius:50,aircraft:[],markers:new Map(),userMarker:null,circles:[],timer:null,loading:false};

    function setStatus(text, bad=false){ $('status').textContent=text; $('status').style.color=bad?'#ff8f8f':''; }
    function fmt(v, suffix=''){ return (v===undefined||v===null||v===''||Number.isNaN(v))?'—':`${v}${suffix}`; }
    function haversine(lat1,lon1,lat2,lon2){
      const R=6371, dLat=(lat2-lat1)*Math.PI/180, dLon=(lon2-lon1)*Math.PI/180;
      const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
      return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
    }
    function compass(deg){
      if(deg===undefined||deg===null) return '—';
      const dirs=['N','NÖ','Ö','SÖ','S','SV','V','NV'];
      return `${Math.round(deg)}° ${dirs[Math.round(deg/45)%8]}`;
    }
    function planeIcon(track=0){
      return L.divIcon({
        className:'aircraft-icon',
        html:`<svg style="transform:rotate(${track||0}deg)" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2c.8 0 1.4.6 1.4 1.4v5.2l7.1 4.1v1.8l-7.1-2.1v5l2.2 1.6v1.3L12 19.4l-3.6.9V19l2.2-1.6v-5l-7.1 2.1v-1.8l7.1-4.1V3.4C10.6 2.6 11.2 2 12 2z"/></svg>`,
        iconSize:[32,32],iconAnchor:[16,16]
      });
    }
    function drawRings(){
      state.circles.forEach(c=>map.removeLayer(c)); state.circles=[];
      if(state.lat===null) return;
      const steps=[.25,.5,.75,1];
      steps.forEach((s,i)=>{
        const c=L.circle([state.lat,state.lon],{
          radius:state.radius*1852*s,color:i===3?'#54e0ff':'#315466',weight:i===3?1.5:1,
          opacity:.75,fill:i===3,fillColor:'#54e0ff',fillOpacity:i===3?.025:0,dashArray:i===3?null:'4 8'
        }).addTo(map); state.circles.push(c);
      });
    }
    function setPosition(lat,lon,accuracy){
      state.lat=lat; state.lon=lon;
      $('coordText').textContent=`${lat.toFixed(4)}, ${lon.toFixed(4)}`;
      if(state.userMarker) map.removeLayer(state.userMarker);
      state.userMarker=L.marker([lat,lon],{icon:L.divIcon({className:'',html:'<div class="user-dot"></div>',iconSize:[18,18],iconAnchor:[9,9]})}).addTo(map);
      drawRings();
      const bounds=L.latLng(lat,lon).toBounds(state.radius*1852*2);
      map.fitBounds(bounds,{padding:[25,25]});
      setStatus(`Position hittad${accuracy?` (±${Math.round(accuracy)} m)`:''}. Hämtar flyg…`);
      loadAircraft();
    }
    function locate(){
      if(!navigator.geolocation){ setStatus('GPS stöds inte i den här webbläsaren.',true); return; }
      setStatus('Hämtar GPS-position…');
      navigator.geolocation.getCurrentPosition(
        p=>setPosition(p.coords.latitude,p.coords.longitude,p.coords.accuracy),
        e=>setStatus(`Kunde inte läsa position: ${e.message}. Öppna via HTTPS/localhost och tillåt plats.`,true),
        {enableHighAccuracy:true,timeout:15000,maximumAge:15000}
      );
    }
    async function fetchSource(source){
      const r=state.radius, lat=state.lat.toFixed(5), lon=state.lon.toFixed(5);
      const url=source==='airplanes'
        ? `https://api.airplanes.live/v2/point/${lat}/${lon}/${r}`
        : `https://api.adsb.lol/v2/point/${lat}/${lon}/${r}`;
      const res=await fetch(url,{cache:'no-store'});
      if(!res.ok) throw new Error(`HTTP ${res.status}`);
      return res.json();
    }
    async function loadAircraft(){
      if(state.loading||state.lat===null) return;
      state.loading=true; $('refreshBtn').textContent='…';
      const preferred=$('sourceSelect').value;
      try{
        let data;
        try{ data=await fetchSource(preferred); }
        catch(firstErr){
          const backup=preferred==='airplanes'?'adsblol':'airplanes';
          setStatus(`Primär källa svarade inte, provar ${backup==='airplanes'?'Airplanes.live':'ADSB.lol'}…`);
          data=await fetchSource(backup);
        }
        state.aircraft=(data.ac||data.aircraft||[]).filter(a=>Number.isFinite(a.lat)&&Number.isFinite(a.lon));
        renderAircraft();
        const stamp=new Date().toLocaleTimeString('sv-SE',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
        setStatus(`${state.aircraft.length} flyg hittades · uppdaterad ${stamp}`);
      }catch(err){
        setStatus(`Kunde inte hämta flygdata: ${err.message}. Datakällan kan blockera lokala filer/CORS.`,true);
      }finally{state.loading=false;$('refreshBtn').textContent='↻';}
    }
    function renderAircraft(){
      const incoming=new Set();
      state.aircraft.forEach(a=>{
        const id=a.hex||a.flight||`${a.lat},${a.lon}`;
        incoming.add(id);
        let m=state.markers.get(id);
        if(!m){
          m=L.marker([a.lat,a.lon],{icon:planeIcon(a.track),zIndexOffset:500}).addTo(map);
          m.on('click',()=>showDetails(a));
          state.markers.set(id,m);
        }else{
          m.setLatLng([a.lat,a.lon]); m.setIcon(planeIcon(a.track)); m.off('click'); m.on('click',()=>showDetails(a));
        }
      });
      [...state.markers].forEach(([id,m])=>{if(!incoming.has(id)){map.removeLayer(m);state.markers.delete(id)}});
      $('planeCount').textContent=state.aircraft.length;
    }
    function showDetails(a){
      const dist=haversine(state.lat,state.lon,a.lat,a.lon);
      const altitude=a.alt_baro==='ground'?'Mark':(Number.isFinite(a.alt_baro)?`${Math.round(a.alt_baro).toLocaleString('sv-SE')} ft`:'—');
      const flight=(a.flight||a.r||a.hex||'Okänt flyg').trim();
      $('dFlight').textContent=flight;
      $('dSub').textContent=`ICAO ${a.hex||'—'} · senast sedd ${fmt(Math.round(a.seen||a.seen_pos||0),' s')} sedan`;
      $('dDistance').textContent=`${dist.toFixed(1)} km`;
      $('dAltitude').textContent=altitude;
      $('dSpeed').textContent=Number.isFinite(a.gs)?`${Math.round(a.gs)} kt / ${Math.round(a.gs*1.852)} km/h`:'—';
      $('dTrack').textContent=compass(a.track);
      $('dVertical').textContent=Number.isFinite(a.baro_rate)?`${Math.round(a.baro_rate)} ft/min`:'—';
      $('dSquawk').textContent=a.squawk||'—';
      $('dType').textContent=a.t||a.desc||'—';
      $('dReg').textContent=a.r||'—';
      $('dSource').textContent=a.type||'ADS-B';
      $('details').classList.add('open');
    }

    $('locateBtn').addEventListener('click',locate);
    $('refreshBtn').addEventListener('click',loadAircraft);
    $('closeDetails').addEventListener('click',()=>$('details').classList.remove('open'));
    $('sourceSelect').addEventListener('change',loadAircraft);
    $('radius').addEventListener('input',e=>{
      state.radius=Number(e.target.value);
      $('radiusValue').textContent=`${state.radius} NM`;
      $('radiusTop').textContent=state.radius;
      drawRings();
    });
    $('radius').addEventListener('change',()=>{ if(state.lat!==null){ const b=L.latLng(state.lat,state.lon).toBounds(state.radius*1852*2);map.fitBounds(b,{padding:[25,25]});loadAircraft(); }});
    $('autoRefresh').addEventListener('change',e=>{
      clearInterval(state.timer);
      if(e.target.checked) state.timer=setInterval(loadAircraft,10000);
    });
    state.timer=setInterval(loadAircraft,10000);
    if('serviceWorker' in navigator && location.protocol!=='file:') navigator.serviceWorker.register('./sw.js').catch(()=>{});
  </script>
</body>
</html>
